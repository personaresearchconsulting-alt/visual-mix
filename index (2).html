<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRC - Visual Mix HOTS v27</title>
    <style>
        :root { --navy: #0f172a; --gold: #b5935b; --bg: #f8fafc; --emerald: #059669; }
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--navy); min-height: 100vh; }

        .header { background: white; height: 65px; padding: 0 30px; border-bottom: 3px solid var(--gold); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .brand { font-weight: 900; letter-spacing: 2px; font-size: 14px; }
        #timer { font-size: 24px; font-weight: 900; color: #e11d48; font-family: monospace; }

        .container { display: flex; flex-wrap: wrap; min-height: calc(100vh - 65px); }
        
        .visual-panel { 
            flex: 1.2; min-width: 450px; background: #e2e8f0; display: flex; align-items: center; justify-content: center; 
            position: sticky; top: 65px; height: calc(100vh - 65px); border-right: 1px solid #cbd5e1; padding: 30px; 
        }
        .mode-tag { position: absolute; top: 20px; left: 20px; background: var(--navy); color: white; padding: 8px 16px; border-radius: 4px; font-weight: 800; font-size: 11px; z-index: 10; text-transform: uppercase; }
        svg { width: 100%; height: 100%; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1)); }

        .quiz-panel { flex: 0.8; min-width: 350px; background: white; padding: 40px; overflow-y: auto; }
        .q-meta { color: var(--gold); font-weight: 900; font-size: 13px; margin-bottom: 5px; }
        .q-text { font-size: 1.25rem; font-weight: 800; line-height: 1.5; margin-bottom: 30px; }

        .opt-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 40px; }
        .opt-btn { border: 2px solid #f1f5f9; padding: 18px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; transition: 0.2s; font-weight: 600; background: #f8fafc; }
        .opt-btn:hover { border-color: var(--gold); background: #fffdf5; }
        .opt-btn.active { background: var(--navy); color: white; border-color: var(--navy); }
        .opt-idx { width: 35px; font-weight: 900; color: var(--gold); }

        .nav-dots { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; border-top: 1px solid #eee; padding-top: 25px; }
        .dot { width: 32px; height: 32px; border-radius: 6px; border: 1px solid #cbd5e1; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; font-weight: 800; background: white; }
        .dot.active { border: 2px solid var(--gold); color: var(--gold); }
        .dot.filled { background: var(--navy); color: white; border: none; }

        .btn-finish { background: var(--emerald); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: 900; width: 100%; cursor: pointer; margin-top: 30px; }

        #screen-result { display: none; padding: 50px 20px; background: var(--bg); }
        .result-card { background: white; max-width: 800px; margin: 0 auto; padding: 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .score-circle { width: 140px; height: 140px; border-radius: 50%; border: 10px solid var(--gold); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 20px auto; }
        .pembahasan-box { margin-top: 20px; text-align: left; background: #fff; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; border-left: 6px solid var(--navy); }
    </style>
</head>
<body oncontextmenu="return false">

<div id="main-app">
    <div class="header">
        <div class="brand">PERSONA RESEARCH & CONSULTING</div>
        <div id="timer">25:00</div>
    </div>
    <div class="container">
        <div class="visual-panel">
            <div class="mode-tag" id="mode-tag">VISUAL</div>
            <svg id="main-visual" viewBox="0 0 500 500"></svg>
        </div>
        <div class="quiz-panel">
            <div class="q-meta" id="q-idx">SOAL 01 / 30</div>
            <div class="q-text" id="q-txt">Memuat...</div>
            <div class="opt-grid" id="o-grid"></div>
            <div class="nav-dots" id="n-dots"></div>
            <button class="btn-finish" onclick="finish()">SELESAI & LIHAT HASIL</button>
        </div>
    </div>
</div>

<div id="screen-result">
    <div class="result-card">
        <h2 style="text-align:center; letter-spacing: 1px;">HASIL EVALUASI PSIKOLOGI</h2>
        <div class="score-circle">
            <span style="font-size: 14px; font-weight: 800; color: #64748b;">NILAI</span>
            <span id="final-score" style="font-size: 42px; font-weight: 900; color: var(--navy);">0</span>
        </div>
        <p style="text-align:center; font-weight: 700;" id="correct-count"></p>
        <hr style="opacity: 0.3; margin: 30px 0;">
        <h3 style="color: var(--gold);">PEMBAHASAN DETAIL</h3>
        <div id="discussion-area"></div>
    </div>
</div>

<script>
    let cur = 0, answers = {}, timeLeft = 1500;

    const MAP_SVG = `<rect x="0" y="0" width="500" height="500" fill="#e2e8f0"/><path d="M220 0 V500 M0 220 H500 M0 380 H500" stroke="#fff" stroke-width="35"/><circle cx="250" cy="240" r="65" fill="#fff" stroke="#94a3b8" stroke-width="2"/><rect x="30" y="30" width="90" height="65" rx="5" fill="#0f172a"/><text x="75" y="70" fill="white" text-anchor="middle" font-weight="900" font-size="11">KANTOR POS</text><rect x="380" y="30" width="90" height="65" rx="5" fill="#b5935b"/><text x="425" y="70" fill="white" text-anchor="middle" font-weight="900" font-size="11">STASIUN</text><rect x="30" y="280" width="90" height="65" rx="5" fill="#1e293b"/><text x="75" y="320" fill="white" text-anchor="middle" font-weight="900" font-size="11">APOTEK</text><rect x="380" y="280" width="90" height="65" rx="5" fill="#e11d48"/><text x="425" y="320" fill="white" text-anchor="middle" font-weight="900" font-size="11">MUSEUM</text>`;
    
    const CUBE_SVG = `<g transform="translate(100,220) scale(0.85)"><path d="M40 80 L80 60 L120 80 L80 100 Z" fill="#94a3b8" stroke="#475569"/><path d="M120 80 L160 60 L200 80 L160 100 Z" fill="#94a3b8" stroke="#475569"/><path d="M200 80 L240 60 L280 80 L240 100 Z" fill="#94a3b8" stroke="#475569"/><path d="M80 100 L120 80 L160 100 L120 120 Z" fill="#94a3b8" stroke="#475569"/><g transform="translate(40,-20)"><path d="M0 40 L40 20 L80 40 L40 60 Z" fill="#64748b" stroke="#fff"/><path d="M0 40 L0 80 L40 100 L40 60 Z" fill="#475569" stroke="#fff"/><g transform="translate(160,0)"><path d="M0 40 L40 20 L80 40 L40 60 Z" fill="#64748b" stroke="#fff"/><path d="M40 60 L40 100 L80 80 L80 40 Z" fill="#475569" stroke="#fff"/></g></g><g transform="translate(80,-40)"><path d="M0 40 L40 20 L80 40 L40 60 Z" fill="#b5935b" stroke="#fff"/><path d="M40 60 L40 100 L80 80 L80 40 Z" fill="#8a6d3b" stroke="#fff"/></g><g transform="translate(120,-60)"><path d="M0 40 L40 20 L80 40 L40 60 Z" fill="#0f172a" stroke="#fff"/><path d="M40 60 L40 100 L80 80 L80 40 Z" fill="#020617" stroke="#fff"/></g></g>`;

    const bank = [
        // 1-15 NAVIGASI (DENAH)
        { q: "Jika Anda berada di Kantor Pos dan ingin menuju Stasiun melalui Bundaran X, arah mata angin yang Anda tuju setelah melewati bundaran adalah...", o: ["Barat", "Timur Laut", "Timur", "Tenggara", "Utara"], a: "Timur", p: "Gedung Stasiun berada tepat di sisi Timur dari Bundaran X sesuai orientasi peta." },
        { q: "Gedung manakah yang terletak di kuadran Barat Daya dari Bundaran X?", o: ["Kantor Pos", "Apotek", "Museum", "Stasiun", "Tidak Ada"], a: "Apotek", p: "Apotek berada di sisi kiri bawah (Barat Daya) relatif terhadap titik pusat bundaran." },
        { q: "Gedung manakah yang memiliki warna identitas Merah?", o: ["Kantor Pos", "Museum", "Stasiun", "Apotek", "Bundaran"], a: "Museum", p: "Berdasarkan visual denah, gedung Museum digambarkan dengan warna merah." },
        { q: "Berapa jumlah belokan 90 derajat jika Anda berkendara dari Apotek ke Stasiun melewati Bundaran X?", o: ["0 Belokan", "1 Belokan", "2 Belokan", "3 Belokan", "4 Belokan"], a: "0 Belokan", p: "Jalur dari Apotek ke Stasiun melewati Bundaran merupakan satu garis lurus diagonal." },
        { q: "Jika Anda dari Museum menuju Kantor Pos melewati bundaran, ke arah manakah Anda berbelok di bundaran?", o: ["Kiri", "Kanan", "Lurus", "Putar Balik", "Serong Kiri"], a: "Lurus", p: "Museum dan Kantor Pos berada pada poros diagonal yang sama, sehingga hanya perlu jalan lurus melewati pusat bundaran." },
        { q: "Posisi relatif Stasiun terhadap Museum adalah di sebelah...", o: ["Utara", "Selatan", "Barat", "Timur", "Tenggara"], a: "Utara", p: "Gedung Stasiun berada tepat di atas (Utara) gedung Museum pada sisi kanan peta." },
        { q: "Manakah gedung yang paling dekat dengan sisi Barat Laut peta?", o: ["Museum", "Stasiun", "Kantor Pos", "Apotek", "Bundaran"], a: "Kantor Pos", p: "Kantor Pos berada di sudut kiri atas (Barat Laut)." },
        { q: "Bundaran X dikelilingi oleh berapa persimpangan jalan utama?", o: ["2", "3", "4", "5", "6"], a: "4", p: "Bundaran X menghubungkan 4 cabang jalan (Utara, Selatan, Barat, Timur)." },
        { q: "Jika jalan horizontal tengah ditutup, rute dari Apotek ke Museum adalah...", o: ["Lewat Bundaran", "Memutar ke Utara", "Lewat jalur bawah", "Tidak ada akses", "Lewat Kantor Pos"], a: "Lewat jalur bawah", p: "Kedua gedung berada di sisi Selatan, sehingga bisa menggunakan jalur horizontal bawah." },
        { q: "Warna Emas pada peta mewakili gedung...", o: ["Stasiun", "Museum", "Kantor Pos", "Apotek", "Pasar"], a: "Stasiun", p: "Visual warna emas (gold) digunakan untuk menandai gedung Stasiun." },
        { q: "Apotek berada di sebelah ... dari Kantor Pos.", o: ["Timur", "Barat", "Utara", "Selatan", "Tenggara"], a: "Selatan", p: "Secara vertikal, Apotek berada di bawah (Selatan) Kantor Pos pada sisi kiri peta." },
        { q: "Jarak terpendek dari Museum ke Bundaran X adalah ke arah...", o: ["Barat Laut", "Timur Laut", "Barat", "Utara", "Selatan"], a: "Barat Laut", p: "Bundaran berada di sisi kiri atas (Barat Laut) dari gedung Museum." },
        { q: "Gedung yang memiliki warna paling gelap adalah...", o: ["Stasiun", "Museum", "Apotek", "Kantor Pos", "Bundaran"], a: "Kantor Pos", p: "Kantor Pos menggunakan warna Navy (Biru Gelap)." },
        { q: "Jika Anda menghadap ke Timur di Bundaran X, gedung apa yang ada di depan Anda?", o: ["Apotek", "Stasiun", "Museum", "Kantor Pos", "Bundaran"], a: "Stasiun", p: "Sisi Timur bundaran mengarah langsung ke gedung Stasiun." },
        { q: "Berapa total gedung utama yang ada di peta tersebut?", o: ["2", "3", "4", "5", "6"], a: "4", p: "Terdapat 4 gedung: Kantor Pos, Stasiun, Apotek, dan Museum." },

        // 16-30 KUBUS (SPASIAL)
        { q: "Berapa jumlah total kubus pada struktur tersebut (termasuk yang tidak terlihat sebagai penopang)?", o: ["10", "11", "12", "13", "14"], a: "12", p: "Lantai 1: 4 kubus, Lantai 2: 5 kubus, Lantai 3: 2 kubus, Lantai 4: 1 kubus. Total = 12." },
        { q: "Berapa banyak kubus yang menyentuh lantai (dasar) secara langsung?", o: ["3", "4", "5", "6", "7"], a: "4", p: "Pada lapisan paling bawah terlihat 4 fondasi kubus abu-abu." },
        { q: "Warna kubus yang berada pada posisi paling tinggi (puncak) adalah...", o: ["Abu-abu", "Emas", "Navy", "Putih", "Merah"], a: "Navy", p: "Kubus Navy berada di level 4, merupakan titik tertinggi struktur." },
        { q: "Berapa jumlah kubus yang berwarna Emas?", o: ["1", "2", "3", "4", "0"], a: "1", p: "Hanya terdapat 1 kubus berwarna emas pada level 3." },
        { q: "Berapa banyak kubus yang 'tersembunyi' (tidak terlihat tapi harus ada sebagai penopang)?", o: ["1", "2", "3", "4", "0"], a: "3", p: "Ada 3 titik di mana kubus di atasnya membutuhkan penopang di bawah yang tidak tertangkap kamera." },
        { q: "Jika kubus Navy di puncak diambil, berapa sisa kubus yang ada?", o: ["9", "10", "11", "12", "13"], a: "11", p: "Total 12 dikurangi 1 kubus puncak menjadi 11." },
        { q: "Berapa jumlah kubus pada level/lapisan ke-2 dari bawah?", o: ["3", "4", "5", "6", "2"], a: "5", p: "Lapisan kedua memiliki tumpukan yang lebih lebar untuk menopang level di atasnya." },
        { q: "Berapa banyak kubus yang berwarna Abu-abu?", o: ["8", "9", "10", "11", "7"], a: "10", p: "Total 12 kubus - 1 Emas - 1 Navy = 10 Abu-abu." },
        { q: "Apakah kubus Emas dan Navy berada pada kolom yang sama?", o: ["Ya", "Tidak", "Mungkin", "Hanya bersentuhan sisi", "Sejajar horizontal"], a: "Tidak", p: "Keduanya berada pada level yang berbeda dan posisi kolom yang bergeser." },
        { q: "Jika struktur ingin dijadikan balok 4x4x1, berapa kubus lagi yang dibutuhkan di lantai dasar?", o: ["10", "12", "14", "16", "8"], a: "12", p: "4x4 = 16. Sudah ada 4, maka 16 - 4 = 12." },
        { q: "Berapa sisi kubus Emas yang terlihat dari sudut pandang ini?", o: ["1", "2", "3", "4", "5"], a: "3", p: "Terlihat sisi atas, sisi depan-kiri, dan sisi depan-kanan." },
        { q: "Berapa banyak kubus yang memiliki setidaknya satu sisi warna putih (outline)?", o: ["Semua", "Hanya yang berwarna", "Hanya abu-abu", "Tidak ada", "Setengahnya"], a: "Semua", p: "Semua kubus dalam ilustrasi menggunakan stroke/garis putih untuk memperjelas dimensi." },
        { q: "Jika kubus paling kanan bawah diambil, apakah struktur di atasnya akan runtuh?", o: ["Ya", "Tidak", "Hanya miring", "Tergantung gravitasi", "Tidak ada kubus di atasnya"], a: "Tidak", p: "Sisi paling kanan bawah tidak menopang tumpukan level 2 ke atas." },
        { q: "Total lapisan ketinggian pada struktur ini adalah...", o: ["2", "3", "4", "5", "6"], a: "4", p: "Terdiri dari Level 1 (Dasar), Level 2, Level 3 (Emas), dan Level 4 (Navy)." },
        { q: "Berapa perbandingan jumlah kubus berwarna (Emas+Navy) dengan kubus Abu-abu?", o: ["1:5", "1:6", "2:10", "2:12", "1:10"], a: "1:5", p: "2 kubus berwarna : 10 kubus abu-abu = 1:5." }
    ];

    function render() {
        const s = bank[cur];
        document.getElementById('q-idx').innerText = `SOAL ${String(cur+1).padStart(2,'0')} / 30`;
        document.getElementById('mode-tag').innerText = (cur < 15 ? "NAVIGASI" : "LOGIKA SPASIAL");
        document.getElementById('q-txt').innerText = s.q;
        document.getElementById('main-visual').innerHTML = (cur < 15 ? MAP_SVG : CUBE_SVG);

        if(!s.shuffledOptions) {
            let options = [...s.o];
            s.shuffledOptions = options.sort(() => Math.random() - 0.5);
        }

        const grid = document.getElementById('o-grid');
        grid.innerHTML = "";
        s.shuffledOptions.forEach((opt, i) => {
            const btn = document.createElement('div');
            btn.className = 'opt-btn' + (answers[cur] === opt ? ' active' : '');
            btn.innerHTML = `<span class="opt-idx">${String.fromCharCode(65+i)}</span> ${opt}`;
            btn.onclick = () => {
                answers[cur] = opt;
                render();
                setTimeout(() => { if(cur < 29) { cur++; render(); } }, 250);
            };
            grid.appendChild(btn);
        });

        const dots = document.getElementById('n-dots');
        dots.innerHTML = "";
        bank.forEach((_, i) => {
            const d = document.createElement('div');
            d.className = 'dot' + (i === cur ? ' active' : '') + (answers[i] ? ' filled' : '');
            d.innerText = i + 1;
            d.onclick = () => { cur = i; render(); };
            dots.appendChild(d);
        });
    }

    function finish() {
        let answered = Object.keys(answers).length;
        if(answered < 30) {
            if(!confirm(`Anda baru menjawab ${answered} soal. Yakin ingin selesai?`)) return;
        }
        
        let correct = 0;
        let discussHtml = "";
        
        bank.forEach((q, i) => {
            const isCorrect = answers[i] === q.a;
            if(isCorrect) correct++;
            
            discussHtml += `
                <div class="pembahasan-box" style="border-left-color: ${isCorrect ? '#059669' : '#e11d48'}">
                    <div style="font-weight: 900; margin-bottom: 8px; color: var(--navy)">SOAL ${i+1}</div>
                    <div style="font-size: 14px; margin-bottom: 10px;">${q.q}</div>
                    <div style="font-size: 13px;">
                        <span style="color: ${isCorrect ? '#059669' : '#e11d48'}">● Jawaban Anda: ${answers[i] || 'Tidak dijawab'}</span><br>
                        <span style="color: #059669">● Jawaban Benar: ${q.a}</span>
                    </div>
                    <div style="margin-top: 12px; font-size: 13px; color: #64748b; background: #f8fafc; padding: 10px; border-radius: 6px;">
                        <strong>Analisis:</strong> ${q.p}
                    </div>
                </div>`;
        });

        const score = Math.round((correct / 30) * 100);
        
        document.getElementById('main-app').style.display = 'none';
        document.getElementById('screen-result').style.display = 'block';
        document.getElementById('final-score').innerText = score;
        document.getElementById('correct-count').innerText = `TOTAL BENAR: ${correct} / 30 SOAL`;
        document.getElementById('discussion-area').innerHTML = discussHtml;
        window.scrollTo(0,0);
    }

    window.onload = () => {
        render();
        setInterval(() => {
            let m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            if(timeLeft-- <= 0) finish();
        }, 1000);
    };
</script>
</body>
</html>
